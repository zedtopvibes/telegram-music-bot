name = "tgbot"
main = "src/index.js"
compatibility_date = "2024-01-01"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "zedtopvibes-db"
database_id = "73f2a3ac-0d13-454b-9e77-36d5a78c1762"

# R2 Bucket binding
[[r2_buckets]]
binding = "AUDIO"
bucket_name = "zedtopvibes-audio"

# Environment variables (non-secret)
[vars]
CHANNEL_USERNAME = "zedtopvibes"

# Secrets will be set via dashboard or `wrangler secret put`
